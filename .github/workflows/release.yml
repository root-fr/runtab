# Installed by scripts/export-public.sh as .github/workflows/release.yml in the
# public repo (github.com/root-fr/runtab). Tag a release there (`git tag v0.1.0
# && git push --tags`) to build binaries for all platforms and publish to npm.
# Requires an npm automation token in the repo secret NPM_TOKEN.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # npm --provenance

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: runtab-linux-x64
            runner: ubuntu-22.04
          - target: runtab-linux-arm64
            runner: ubuntu-22.04-arm
          - target: runtab-darwin-arm64
            runner: macos-14
          - target: runtab-win32-x64
            runner: windows-2022
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Build dashboard UI
        run: npm ci && npm run build
        working-directory: ui
      - name: Build release binary
        run: cargo build --release -p runtab --features embed-ui
      - name: Smoke test
        run: ./target/release/runtab --version
        shell: bash
      - name: Stage binary
        shell: bash
        run: |
          mkdir -p "artifact/${{ matrix.target }}"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp target/release/runtab.exe "artifact/${{ matrix.target }}/"
          else
            cp target/release/runtab "artifact/${{ matrix.target }}/"
          fi
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: artifact/${{ matrix.target }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - name: Check tag matches crate version
        run: |
          CRATE_VERSION="$(grep -m1 '^version' crates/runtab/Cargo.toml | cut -d'"' -f2)"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$CRATE_VERSION" != "$TAG_VERSION" ]; then
            echo "tag v$TAG_VERSION does not match crate version $CRATE_VERSION" >&2
            exit 1
          fi
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
      - name: Assemble npm packages
        run: node npm/make-packages.mjs --version "${GITHUB_REF_NAME#v}" --artifacts artifacts
      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        # Platform packages before the main package: the main package's
        # optionalDependencies must resolve at publish time (glob expands
        # `runtab-*` first, then the literal `runtab`). Each publish is guarded
        # by an already-published check so a re-run after a partial publish
        # skips what landed instead of dying on E403. A `-` in the version
        # (prerelease) publishes under the `next` dist-tag, never `latest`.
        run: |
          v="${GITHUB_REF_NAME#v}"
          case "$v" in *-*) tag=next ;; *) tag=latest ;; esac
          for dir in npm/dist/runtab-* npm/dist/runtab; do
            name="$(basename "$dir")"
            if npm view "$name@$v" version >/dev/null 2>&1; then
              echo "skip $name@$v (already published)"
              continue
            fi
            npm publish --provenance --access public --tag "$tag" "$dir"
          done
